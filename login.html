<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="JITConnect - College Social Network Platform">
    <meta name="theme-color" content="#667eea">
    <link rel="manifest" href="manifest.json">
    <title>JITConnect - Login</title>
    <link rel="stylesheet" href="ferrari-styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body class="page-login">
    <div class="background-wrapper">
        <div class="overlay"></div>
    </div>

    <div class="login-container">
        <div class="login-card">
            <div class="logo-section">
                <img src="assets/jit-images/JIT-LOGO.png" alt="JIT Logo" class="login-logo-img">
                <h1 class="logo-text">JITCONNECT</h1>
                <p class="tagline">CONNECT • SHARE • GROW</p>
                <p class="subtitle">Jyothy Institute of Technology</p>
            </div>
            
            <div id="loginForm" class="form-section">
                <h2 class="form-title">WELCOME BACK</h2>
                <div id="errorMessage" style="display: none; padding: 12px; margin-bottom: 20px; background: rgba(220, 0, 0, 0.1); border: 1px solid rgba(220, 0, 0, 0.3); color: #DC0000; font-size: 14px; border-radius: 8px;"></div>
                <form onsubmit="handleLogin(event)">
                    <div class="input-group">
                        <input type="email" id="loginEmail" placeholder="Email Address" required>
                    </div>
                    <div class="input-group">
                        <input type="password" id="loginPassword" placeholder="Password" required>
                    </div>
                    <button type="submit" class="btn-primary" id="loginBtn">LOGIN</button>
                </form>
                <p class="switch-text">Don't have an account? <a href="#" onclick="showRegister(); return false;">SIGN UP</a></p>
            </div>

            <div id="registerForm" class="form-section" style="display: none;">
                <h2 class="form-title">CREATE ACCOUNT</h2>
                <div id="registerErrorMessage" style="display: none; padding: 12px; margin-bottom: 20px; background: rgba(220, 0, 0, 0.1); border: 1px solid rgba(220, 0, 0, 0.3); color: #DC0000; font-size: 14px; border-radius: 8px;"></div>
                <form onsubmit="handleRegister(event)">
                    <div class="input-group">
                        <input type="text" id="regName" placeholder="Full Name" required>
                    </div>
                    <div class="input-group">
                        <input type="email" id="regEmail" placeholder="College Email (@jyothyit.ac.in or @jit.ac.in)" required>
                    </div>
                    <div class="input-group">
                        <input type="password" id="regPassword" placeholder="Password (min 8 characters)" required oninput="checkPasswordStrength()">
                        <div id="passwordStrengthBar" class="password-strength-bar">
                            <div id="passwordStrengthFill" class="password-strength-fill"></div>
                        </div>
                        <div id="passwordStrengthText" class="password-strength-text"></div>
                    </div>
                    
                    <div class="input-group">
                        <select id="regRole" required onchange="handleRoleChange()">
                            <option value="">Select Role</option>
                            <option value="student">Student</option>
                            <option value="faculty">Faculty</option>
                            <option value="alumni">Alumni</option>
                            <option value="department">Department</option>
                        </select>
                    </div>

                    <div id="studentFields" class="role-fields" style="display: none;">
                        <div class="input-group">
                            <input type="text" id="usn" placeholder="USN">
                        </div>
                        <div class="input-group">
                            <input type="text" id="branch" placeholder="Branch">
                        </div>
                        <div class="input-group">
                            <input type="text" id="year" placeholder="Year">
                        </div>
                    </div>

                    <div id="facultyFields" class="role-fields" style="display: none;">
                        <div class="input-group">
                            <input type="text" id="department" placeholder="Department">
                        </div>
                        <div class="input-group">
                            <input type="text" id="designation" placeholder="Designation">
                        </div>
                        <div class="input-group">
                            <input type="text" id="experience" placeholder="Years of Experience">
                        </div>
                    </div>

                    <div id="alumniFields" class="role-fields" style="display: none;">
                        <div class="input-group">
                            <input type="text" id="batch" placeholder="Batch Year">
                        </div>
                        <div class="input-group">
                            <input type="text" id="alumniBranch" placeholder="Branch">
                        </div>
                        <div class="input-group">
                            <input type="text" id="company" placeholder="Current Company">
                        </div>
                        <div class="input-group">
                            <input type="text" id="alumniDesignation" placeholder="Designation">
                        </div>
                    </div>

                    <div id="departmentFields" class="role-fields" style="display: none;">
                        <div class="input-group">
                            <input type="text" id="deptName" placeholder="Department Name">
                        </div>
                        <div class="input-group">
                            <textarea id="deptDescription" placeholder="Description" rows="3"></textarea>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn-primary" id="registerBtn">CREATE ACCOUNT</button>
                </form>
                <p class="switch-text">Already have an account? <a href="#" onclick="showLogin(); return false;">LOGIN</a></p>
            </div>
        </div>
    </div>

    <script>
        // Inline fallback - guaranteed to work
        function showRegister() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
            return false;
        }
        
        function showLogin() {
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
            return false;
        }
        
        // Simple Password Strength Checker
        function checkPasswordStrength() {
            const password = document.getElementById('regPassword').value;
            const strengthBar = document.getElementById('passwordStrengthFill');
            const strengthText = document.getElementById('passwordStrengthText');
            
            if (!password) {
                if (strengthBar) strengthBar.className = 'password-strength-fill';
                if (strengthText) strengthText.textContent = '';
                return;
            }
            
            // Calculate strength score
            let score = 0;
            
            // Length check
            if (password.length >= 8) score++;
            if (password.length >= 12) score++;
            
            // Character variety checks
            if (/[a-z]/.test(password)) score++; // lowercase
            if (/[A-Z]/.test(password)) score++; // uppercase
            if (/[0-9]/.test(password)) score++; // numbers
            if (/[^a-zA-Z0-9]/.test(password)) score++; // special chars
            
            // Determine strength level
            let strength = 'weak';
            let label = '❌ Weak';
            
            if (score >= 6) {
                strength = 'strong';
                label = '💪 Strong Password';
            } else if (score >= 4) {
                strength = 'good';
                label = '👍 Good Password';
            } else if (score >= 2) {
                strength = 'fair';
                label = '⚠️ Fair Password';
            }
            
            // Update UI
            if (strengthBar) {
                strengthBar.className = 'password-strength-fill ' + strength;
            }
            if (strengthText) {
                strengthText.className = 'password-strength-text ' + strength;
                strengthText.textContent = label;
            }
        }
        
        // Ensure forms are in correct state on load
        window.addEventListener('load', function() {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('registerForm').style.display = 'none';
        });
    </script>
    <script src="login-script.js"></script>
</body>
</html>
