<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JITConnect - Profile</title>
    <link rel="stylesheet" href="ferrari-styles.css">
    <link rel="stylesheet" href="chatbot-widget.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body class="page-profile">
    <div class="background-wrapper">
        <div class="overlay"></div>
    </div>

    <div class="dashboard-container">
        <aside class="sidebar">
            <img src="assets/jit-images/JIT-LOGO.png" alt="JIT Logo" class="sidebar-logo-img">
            <h1 class="sidebar-logo">JITCONNECT</h1>
            <nav>
                <ul class="nav-menu">
                    <li class="nav-item"><a href="dashboard.html" class="nav-link"><span>🏠</span> HOME</a></li>
                    <li class="nav-item"><a href="explore.html" class="nav-link"><span>🔍</span> EXPLORE</a></li>
                    <li class="nav-item"><a href="jobs.html" class="nav-link"><span>💼</span> JOBS</a></li>
                    <li class="nav-item"><a href="messages.html" class="nav-link"><span>💬</span> MESSAGES</a></li>
                    <li class="nav-item"><a href="chatbot.html" class="nav-link"><span>🤖</span> ALUMNI MATCHER</a></li>
                    <li class="nav-item"><a href="profile.html" class="nav-link active"><span>👤</span> PROFILE</a></li>
                    <li class="nav-item"><a href="connections.html" class="nav-link"><span>🤝</span> CONNECTIONS</a></li>
                    <li class="nav-item"><a href="#" class="nav-link" onclick="logout()"><span>🚪</span> LOGOUT</a></li>
                </ul>
            </nav>
        </aside>

        <main class="feed" style="grid-column: span 2;">
            <div class="profile-header" style="background: rgba(255, 255, 255, 0.92); backdrop-filter: blur(10px); border: 2px solid rgba(220, 0, 0, 0.2); padding: 40px; margin-bottom: 30px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);">
                <div style="display: flex; align-items: center; gap: 24px;">
                    <div class="avatar" style="width: 100px; height: 100px; font-size: 40px;" id="profileAvatar"></div>
                    <div style="flex: 1;">
                        <h2 id="profileName" style="margin-bottom: 8px; color: #1A1A1A;"></h2>
                        <p id="profileRole" style="font-size: 16px; color: rgba(0, 0, 0, 0.7); margin-bottom: 4px;"></p>
                        <p id="profileDetails" style="font-size: 14px; color: rgba(0, 0, 0, 0.6);"></p>
                        <button class="btn-primary" style="width: auto; padding: 10px 24px; margin-top: 16px;" onclick="editProfile()">
                            Edit Profile
                        </button>
                    </div>
                </div>
            </div>

            <div style="background: rgba(255, 255, 255, 0.92); backdrop-filter: blur(10px); border: 2px solid rgba(220, 0, 0, 0.2); padding: 30px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);">
                <h3 style="margin-bottom: 30px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; color: #1A1A1A;">MY POSTS</h3>
                <div id="userPostsContainer"></div>
            </div>
        </main>
    </div>

    <!-- Edit Profile Modal -->
    <div id="editProfileModal" class="modal" style="display: none;">
        <div class="modal-content" style="max-width: 600px;">
            <div class="modal-header">
                <h2>Edit Profile</h2>
                <span class="modal-close" onclick="closeEditModal()">&times;</span>
            </div>
            <div class="modal-body">
                <form id="editProfileForm" onsubmit="saveProfile(event)">
                    <div class="input-group">
                        <label>Full Name</label>
                        <input type="text" id="editName" required>
                    </div>
                    
                    <div class="input-group">
                        <label>Email (Read-only)</label>
                        <input type="email" id="editEmail" readonly style="background: rgba(0,0,0,0.05); cursor: not-allowed;">
                    </div>
                    
                    <!-- Student Fields -->
                    <div id="editStudentFields" class="edit-role-fields" style="display: none;">
                        <div class="input-group">
                            <label>Branch</label>
                            <input type="text" id="editBranch">
                        </div>
                        <div class="input-group">
                            <label>Year</label>
                            <input type="text" id="editYear">
                        </div>
                        <div class="input-group">
                            <label>USN</label>
                            <input type="text" id="editUsn">
                        </div>
                    </div>
                    
                    <!-- Faculty Fields -->
                    <div id="editFacultyFields" class="edit-role-fields" style="display: none;">
                        <div class="input-group">
                            <label>Department</label>
                            <input type="text" id="editDepartment">
                        </div>
                        <div class="input-group">
                            <label>Designation</label>
                            <input type="text" id="editDesignation">
                        </div>
                        <div class="input-group">
                            <label>Experience (years)</label>
                            <input type="text" id="editExperience">
                        </div>
                    </div>
                    
                    <!-- Alumni Fields -->
                    <div id="editAlumniFields" class="edit-role-fields" style="display: none;">
                        <div class="input-group">
                            <label>Batch Year</label>
                            <input type="text" id="editBatch">
                        </div>
                        <div class="input-group">
                            <label>Branch</label>
                            <input type="text" id="editAlumniBranch">
                        </div>
                        <div class="input-group">
                            <label>Company</label>
                            <input type="text" id="editCompany">
                        </div>
                        <div class="input-group">
                            <label>Designation</label>
                            <input type="text" id="editAlumniDesignation">
                        </div>
                    </div>
                    
                    <!-- Department Fields -->
                    <div id="editDepartmentFields" class="edit-role-fields" style="display: none;">
                        <div class="input-group">
                            <label>Department Name</label>
                            <input type="text" id="editDeptName">
                        </div>
                        <div class="input-group">
                            <label>Description</label>
                            <textarea id="editDeptDescription" rows="3"></textarea>
                        </div>
                    </div>
                    
                    <div style="display: flex; gap: 12px; margin-top: 24px;">
                        <button type="submit" class="btn-primary" style="flex: 1;">Save Changes</button>
                        <button type="button" class="btn-secondary" onclick="closeEditModal()" style="flex: 1;">Cancel</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="profile-script.js"></script>
    <script src="edit-profile.js"></script>
    <script src="chatbot-widget.js"></script>
    
    <!-- Inline fallback for edit profile -->
    <script>
        // Ensure functions are available
        window.addEventListener('load', function() {
            console.log('Profile page fully loaded');
            
            // Verify edit profile functions exist
            if (typeof window.editProfile === 'function') {
                console.log('✓ editProfile function available');
            } else {
                console.error('✗ editProfile function NOT available');
            }
            
            if (typeof window.closeEditModal === 'function') {
                console.log('✓ closeEditModal function available');
            } else {
                console.error('✗ closeEditModal function NOT available');
            }
            
            if (typeof window.saveProfile === 'function') {
                console.log('✓ saveProfile function available');
            } else {
                console.error('✗ saveProfile function NOT available');
            }
        });
    </script>
</body>
</html>
